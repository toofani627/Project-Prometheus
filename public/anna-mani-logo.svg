  <path d="M25 75 Q18 75 18 67 Q18 59 27 58 Q26 47 36 44 Q38 36 48 36 Q56 36 60 42 Q65 38 72 40 Q80 42 80 51 Q88 52 88 60 Q88 68 80 68 L25 68 Z"
    fill="#F4E7D5" stroke="#F4E7D5" stroke-width="0"/>

  <!-- Cloud refined -->
  <ellipse cx="38" cy="65" rx="20" ry="13" fill="#F4E7D5"/>
  <ellipse cx="57" cy="60" rx="18" ry="16" fill="#F4E7D5"/>
  <ellipse cx="72" cy="65" rx="14" ry="11" fill="#F4E7D5"/>
  <rect x="24" y="65" width="62" height="13" fill="#F4E7D5" rx="2"/>

  <!-- Balloon body -->
  <ellipse cx="54" cy="42" rx="16" ry="20" fill="#F4E7D5" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Balloon highlight dashes -->
  <path d="M46 34 Q44 40 46 46" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-dasharray="3 3"/>

